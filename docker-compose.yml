services:
  frontend:
    build: ./frontend
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://host.docker.internal:6379/0
    volumes:
      - ./backend:/app
      - ./tmp:/tmp/trans
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: ./backend
    command: celery -A tasks worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - REDIS_URL=redis://host.docker.internal:6379/0
    volumes:
      - ./backend:/app
      - ./tmp:/tmp/trans
    extra_hosts:
      - "host.docker.internal:host-gateway"
