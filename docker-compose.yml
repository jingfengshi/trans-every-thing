services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_TRANSLATE_API_KEY=${GOOGLE_TRANSLATE_API_KEY}
      - ANTHROPIC_BASE_URL=http://llm.moontontech.net
      - REDIS_URL=redis://host.docker.internal:6379/0
      - MAX_FILE_SIZE_MB=50
    volumes:
      - ./backend:/app
      - ./tmp:/tmp/trans
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: ./backend
    command: celery -A tasks worker --loglevel=info --concurrency=2
    environment:
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_TRANSLATE_API_KEY=${GOOGLE_TRANSLATE_API_KEY}
      - ANTHROPIC_BASE_URL=http://llm.moontontech.net
      - REDIS_URL=redis://host.docker.internal:6379/0
      - MAX_FILE_SIZE_MB=50
    volumes:
      - ./backend:/app
      - ./tmp:/tmp/trans
    extra_hosts:
      - "host.docker.internal:host-gateway"
